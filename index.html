<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eye Protector</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- WORK MODE UI -->
    <div id="work-container" class="card">
        <h2 class="title">Next break in:</h2>

        <!-- Displays the work countdown (MM:SS) -->
        <div id="work-timer" class="time-display">20:00</div>

        <p class="hint">Keep focusing 👀</p>
    </div>

    <!-- BREAK MODE UI (starts hidden) -->
    <div id="break-popup" class="card" style="display: none;">
        <h2 class="title">Rest your eyes >_<</h2>
        <p class="hint">Look away from the screen</p>

        <!-- Displays the break countdown (20, 19, 18...) -->
        <div id="break-timer" class="time-display">20</div>

        <!-- Optional image -->
        <!-- <img src="bear.png" class="bear" alt="Bear telling you to rest" /> -->
    </div>

    <!-- START / STOP BUTTON -->
    <button id="toggle-btn" class="control-btn">Start</button>

    <!-- Your JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
